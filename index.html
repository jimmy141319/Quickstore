<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickStore V3</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fb;
color:#1f2937;
}

header{
background:#ffffff;
padding:18px 24px;
border-bottom:1px solid #e5e7eb;
box-shadow:0 4px 20px rgba(0,0,0,0.06);
}

.logo{
font-size:28px;
font-weight:bold;
color:#312e81;
}

.hero{
padding:40px 20px;
max-width:1100px;
margin:auto;
}

.hero h1{
font-size:42px;
margin:0 0 10px;
}

.hero p{
color:#6b7280;
}

.main{
max-width:1100px;
margin:20px auto;
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
padding:0 20px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #d1d5db;
}

button{
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
}

.secondary{
background:#eef2ff;
color:#312e81;
}

.store{
border:1px solid #e5e7eb;
border-radius:16px;
overflow:hidden;
}

.store-header{
padding:20px;
background:white;
border-bottom:1px solid #eee;
font-weight:bold;
font-size:22px;
}

.store-hero{
padding:40px;
text-align:center;
background:linear-gradient(135deg,#eef2ff,#f5f3ff);
}

.store-hero h1{
margin:0 0 10px;
}

.product{
padding:20px;
border-top:1px solid #eee;
}

.product img{
width:100%;
border-radius:10px;
}

.price{
color:#7c3aed;
font-weight:bold;
font-size:20px;
}

.contact{
padding:20px;
border-top:1px solid #eee;
}

.contact a{
display:inline-block;
margin-top:10px;
padding:10px 16px;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
border-radius:10px;
text-decoration:none;
}

@media(max-width:900px){

.main{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>
<div class="logo">QuickStore</div>
</header>

<div class="hero">
<h1>QuickStore Builder V3</h1>
<p>Create your online store in 3 minutes</p>
</div>

<div class="main">

<div class="card">

<input id="name" placeholder="Store Name">

<input id="tagline" placeholder="Tagline">

<input id="product" placeholder="Product Name">

<input id="price" placeholder="Price">

<textarea id="desc" placeholder="Product Description"></textarea>

<input id="image" placeholder="Image URL">

<input id="contact" placeholder="LINE / WhatsApp Link">

<button class="primary" onclick="generate()">Generate Store</button>

<br><br>

<button class="secondary" onclick="demo()">Load Demo</button>

</div>

<div class="card">

<div class="store">

<div class="store-header" id="s_name">
Your Store
</div>

<div class="store-hero">
<h1 id="s_tagline">Your tagline</h1>
</div>

<div class="product">

<img id="s_img" src="https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=800&q=80">

<h2 id="s_product">Product</h2>

<div class="price" id="s_price">$0</div>

<p id="s_desc">Description</p>

</div>

<div class="contact">

<div>Order Now</div>

<a id="s_contact" href="#">Contact</a>

</div>

</div>

</div>

</div>

<script>

function generate(){

let name=document.getElementById("name").value
let tagline=document.getElementById("tagline").value
let product=document.getElementById("product").value
let price=document.getElementById("price").value
let desc=document.getElementById("desc").value
let img=document.getElementById("image").value
let contact=document.getElementById("contact").value

document.getElementById("s_name").innerText=name
document.getElementById("s_tagline").innerText=tagline
document.getElementById("s_product").innerText=product
document.getElementById("s_price").innerText=price
document.getElementById("s_desc").innerText=desc

if(img){
document.getElementById("s_img").src=img
}

document.getElementById("s_contact").href=contact

}

function demo(){

document.getElementById("name").value="MuStar Cookies"
document.getElementById("tagline").value="Handmade cookies & nut tart"
document.getElementById("product").value="Nut Tart"
document.getElementById("price").value="$9"
document.getElementById("desc").value="Fresh handmade nut tart with crispy shell."
document.getElementById("image").value="https://images.unsplash.com/photo-1519869325930-281384150729?auto=format&fit=crop&w=800&q=80"
document.getElementById("contact").value="https://line.me"

generate()

}

</script>

</body>
</html>
